<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>English Buddy 🎤</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; font-family: 'Nunito', sans-serif; }
.screen { position: fixed; inset: 0; display: flex; flex-direction: column; transition: opacity .35s, transform .35s; }
.screen.hidden { opacity: 0; pointer-events: none; transform: scale(.96); }

/* ── HOME ── */
#home { background: #06080f; align-items: center; justify-content: center; padding: 32px 20px; overflow-y: auto; }
.glow { position: fixed; border-radius: 50%; filter: blur(100px); pointer-events: none; opacity: .22; }
.g1 { width: 500px; height: 500px; background: #0050ff; top: -180px; left: -150px; }
.g2 { width: 400px; height: 400px; background: #8b00ff; bottom: -100px; right: -100px; }
.home-inner { position: relative; z-index: 1; width: 100%; max-width: 420px; text-align: center; }
.logo { font-size: 64px; display: block; animation: float 3.5s ease-in-out infinite; margin-bottom: 8px; }
@keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
.title { font-family:'Syne',sans-serif; font-size: 38px; font-weight: 800; margin-bottom: 6px; background: linear-gradient(135deg,#60b8ff,#fff,#d080ff); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
.sub { color: rgba(255,255,255,.45); font-size: 13px; font-weight: 700; margin-bottom: 10px; }
.badge { display:inline-flex; align-items:center; gap:7px; background:rgba(0,212,255,.08); border:1px solid rgba(0,212,255,.2); border-radius:100px; padding:7px 18px; margin-bottom:34px; }
.badge-dot { width:7px; height:7px; border-radius:50%; background:#00e676; animation:pulse 1.8s ease-in-out infinite; }
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}
.badge span { color:#00d4ff; font-size:12px; font-weight:700; }
.who { color:rgba(255,255,255,.3); font-size:11px; font-weight:800; letter-spacing:2px; text-transform:uppercase; margin-bottom:14px; }
.profiles { display:flex; flex-direction:column; gap:14px; }
.pcard { border-radius:22px; padding:22px 24px; cursor:pointer; border:none; text-align:left; width:100%; position:relative; overflow:hidden; transition:transform .2s, box-shadow .2s; font-family:'Nunito',sans-serif; animation:fadeUp .5s ease both; }
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
.pcard:nth-child(1){animation-delay:.1s} .pcard:nth-child(2){animation-delay:.22s}
.pcard:hover{transform:translateY(-4px)} .pcard:active{transform:scale(.98)}
.shine{position:absolute;inset:0;background:radial-gradient(circle at 25% 25%,rgba(255,255,255,.07),transparent 65%);pointer-events:none}
.yj{background:linear-gradient(145deg,#0a1f35,#0c3050);border:1px solid rgba(0,212,255,.22);box-shadow:0 8px 36px rgba(0,120,255,.15)}
.yj:hover{box-shadow:0 20px 60px rgba(0,180,255,.28)}
.yg{background:linear-gradient(145deg,#160830,#260d50);border:1px solid rgba(160,80,255,.22);box-shadow:0 8px 36px rgba(100,0,255,.12)}
.yg:hover{box-shadow:0 20px 60px rgba(150,50,255,.26)}
.card-row{display:flex;align-items:center;gap:14px;margin-bottom:12px}
.av{width:58px;height:58px;border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:30px;flex-shrink:0}
.av-yj{background:rgba(0,180,255,.15);border:1px solid rgba(0,180,255,.25)}
.av-yg{background:rgba(160,80,255,.15);border:1px solid rgba(160,80,255,.25)}
.cname{font-family:'Syne',sans-serif;font-size:24px;font-weight:800;color:#fff}
.cgrade-yj{font-size:12px;font-weight:700;color:#40c8ff;margin-top:2px}
.cgrade-yg{font-size:12px;font-weight:700;color:#c87fff;margin-top:2px}
.tags{display:flex;flex-wrap:wrap;gap:6px}
.tag{border-radius:100px;padding:4px 11px;font-size:11px;font-weight:700}
.ty{background:rgba(0,212,255,.12);color:#40c8ff;border:1px solid rgba(0,212,255,.2)}
.tg{background:rgba(160,80,255,.12);color:#c87fff;border:1px solid rgba(160,80,255,.2)}
.foot{color:rgba(255,255,255,.2);font-size:11px;font-weight:600;margin-top:24px}

/* ── CHAT ── */
#chat { flex-direction:column; }
.th-yj{background:linear-gradient(160deg,#050e1a,#091c30)}
.th-yg{background:linear-gradient(160deg,#0d0520,#1a0835)}
.c-header{display:flex;align-items:center;gap:12px;padding:14px 18px;flex-shrink:0;border-bottom:1px solid rgba(255,255,255,.07);background:rgba(0,0,0,.2);backdrop-filter:blur(20px)}
.back{background:rgba(255,255,255,.1);border:none;color:#fff;font-size:18px;cursor:pointer;padding:7px 13px;border-radius:11px;font-family:inherit;line-height:1;transition:background .15s}
.back:hover{background:rgba(255,255,255,.18)}
.h-av{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px}
.h-name{font-family:'Syne',sans-serif;font-weight:800;font-size:16px;color:#fff}
.h-status{font-size:11px;font-weight:700;margin-top:1px}
.h-badge{margin-left:auto;border-radius:18px;padding:5px 12px;font-size:11px;font-weight:800;flex-shrink:0}
.msgs{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px}
.msgs::-webkit-scrollbar{width:3px}
.msgs::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px}
.msg-row{display:flex;align-items:flex-end;gap:8px;animation:msgIn .28s ease}
@keyframes msgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.usr-row{flex-direction:row-reverse}
.m-av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.bub{max-width:76%;padding:12px 16px;font-size:14px;line-height:1.65;font-weight:600;white-space:pre-wrap}
.bub-ai{border-radius:18px 18px 18px 3px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.1);color:#fff}
.bub-yj{border-radius:18px 18px 3px 18px;background:linear-gradient(135deg,#0080c8,#004a8c);color:#fff}
.bub-yg{border-radius:18px 18px 3px 18px;background:linear-gradient(135deg,#7b2ff7,#4a00b4);color:#fff}
.fix{margin-top:6px;padding:8px 13px;font-size:12px;font-weight:700}
.fix-yj{background:rgba(0,200,255,.08);border-left:3px solid #00d4ff;color:#70deff}
.fix-yg{background:rgba(180,80,255,.08);border-left:3px solid #c87fff;color:#dba8ff}
.typing-row{display:flex;align-items:flex-end;gap:8px}
.t-bub{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.1);border-radius:18px 18px 18px 3px;padding:14px 16px;display:flex;gap:5px;align-items:center}
.dot{width:7px;height:7px;border-radius:50%;animation:td 1.2s ease-in-out infinite}
@keyframes td{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-7px)}}
.voice-panel{flex-shrink:0;padding:16px 20px;border-top:1px solid rgba(255,255,255,.07);background:rgba(0,0,0,.2);backdrop-filter:blur(20px);display:flex;align-items:center;gap:20px}
.kor-wrap{display:flex;flex-direction:column;align-items:center;gap:4px}
.kor-lbl{font-size:11px;font-weight:700;color:rgba(255,255,255,.4)}
.tsw{position:relative;width:40px;height:22px;cursor:pointer}
.tsl{position:absolute;inset:0;border-radius:22px;background:rgba(255,255,255,.15);transition:.3s}
.tsl:before{content:'';position:absolute;width:16px;height:16px;border-radius:50%;background:#fff;top:3px;left:3px;transition:.3s}
.tsw.on .tsl{background:rgba(0,212,255,.6)}
.tsw.on .tsl:before{transform:translateX(18px)}
.vbtn{width:72px;height:72px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:28px;transition:transform .15s;flex-shrink:0;position:relative}
.vbtn:active{transform:scale(.92)}
.vbtn.listening{animation:vp 1s ease-in-out infinite}
.vbtn.speaking{animation:sp .5s ease-in-out infinite}
@keyframes vp{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
@keyframes sp{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
.ripple{position:absolute;inset:-10px;border-radius:50%;border:2px solid rgba(255,255,255,.2);animation:rip 1.5s ease-out infinite;display:none}
.vbtn.listening .ripple,.vbtn.speaking .ripple{display:block}
@keyframes rip{0%{transform:scale(1);opacity:.8}100%{transform:scale(1.7);opacity:0}}
.vb-yj{background:linear-gradient(135deg,#00d4ff,#0070ff);box-shadow:0 6px 28px rgba(0,180,255,.4)}
.vb-yg{background:linear-gradient(135deg,#c87fff,#7b2fff);box-shadow:0 6px 28px rgba(140,50,255,.4)}
.v-info{flex:1}
.v-status{font-size:14px;font-weight:800;color:#fff;margin-bottom:4px}
.v-hint{font-size:12px;color:rgba(255,255,255,.4);font-weight:600}
.empty{text-align:center;color:rgba(255,255,255,.25);margin:auto;font-size:14px;font-weight:600;padding:40px}

/* desktop layout */
@media(min-width:768px){
  #home{padding:60px 40px}
  .home-inner{max-width:860px}
  .profiles{flex-direction:row;justify-content:center}
  .pcard{width:380px}
  .title{font-size:52px}
  #chat{flex-direction:row}
  .chat-sidebar{width:260px;flex-shrink:0;display:flex;flex-direction:column;border-right:1px solid rgba(255,255,255,.07);background:rgba(0,0,0,.25)}
  .chat-main{flex:1;display:flex;flex-direction:column}
  .sidebar-logo{padding:24px 20px;border-bottom:1px solid rgba(255,255,255,.07)}
  .sidebar-logo-txt{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;color:#fff}
  .sidebar-logo-sub{font-size:11px;color:rgba(255,255,255,.35);font-weight:600;margin-top:3px}
  .sidebar-users{padding:16px;display:flex;flex-direction:column;gap:8px}
  .sidebar-lbl{font-size:10px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.3);margin-bottom:4px}
  .suser{border-radius:14px;padding:12px 14px;border:none;cursor:pointer;font-family:'Nunito',sans-serif;text-align:left;transition:all .2s;display:flex;align-items:center;gap:10px;width:100%}
  .suser-yj{background:rgba(0,180,255,.08);border:1px solid rgba(0,180,255,.15)}
  .suser-yj:hover,.suser-yj.active{background:rgba(0,180,255,.18);border-color:rgba(0,180,255,.35)}
  .suser-yg{background:rgba(150,50,255,.08);border:1px solid rgba(150,50,255,.15)}
  .suser-yg:hover,.suser-yg.active{background:rgba(150,50,255,.18);border-color:rgba(150,50,255,.35)}
  .suser-av{font-size:22px}
  .suser-name{font-family:'Syne',sans-serif;font-size:15px;font-weight:800;color:#fff}
  .suser-grade-yj{font-size:11px;font-weight:600;color:#40c8ff}
  .suser-grade-yg{font-size:11px;font-weight:600;color:#c87fff}
  .sidebar-info{padding:16px;margin-top:auto;border-top:1px solid rgba(255,255,255,.07)}
  .sidebar-info p{font-size:12px;color:rgba(255,255,255,.35);font-weight:600;line-height:1.6}
  .back-desktop{margin:16px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:10px;color:rgba(255,255,255,.5);font-size:13px;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif;transition:all .2s}
  .back-desktop:hover{background:rgba(255,255,255,.1);color:#fff}
  .c-header .back{display:none}
}
</style>
</head>
<body>

<script>
// ══════════════════════════════════════════════
// 🔑 여기에 API 키를 넣어주세요!
const API_KEY = "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";
// ══════════════════════════════════════════════

const PROFILES = {
  yunjae: {
    name:'윤재', emoji:'🏊', grade:'중1 • 수영선수', aiName:'Jake', aiEmoji:'🤙',
    theme:'th-yj', avBg:'linear-gradient(135deg,rgba(0,180,255,.2),rgba(0,100,255,.2))',
    avBorder:'rgba(0,180,255,.3)', statusColor:'#40c8ff',
    badgeBg:'rgba(0,180,255,.1)', badgeColor:'#40c8ff', badgeBorder:'rgba(0,180,255,.2)',
    vbClass:'vb-yj', userBub:'bub-yj', fixClass:'fix-yj',
    dotColor:'rgba(0,200,255,.65)', ttsPitch:1.0, ttsRate:0.92,
    systemPrompt:`You are "Jake", a cool English conversation buddy for Yunjae (윤재), a Korean 13-year-old who:
- Lived in Indonesia for 4 years at an international school — his English is fluent
- Is a competitive swimmer who trains hard
- Just moved back to Korea and misses Indonesia

THIS IS VOICE: Reply in 2-4 natural spoken sentences max. No lists, no markdown. End with 1 question.

STYLE: Cool older friend. Rotate topics: swimming competitions, Indonesia vs Korea, gaming, school life, K-pop vs western music, travel dreams, food, future goals, funny hypotheticals. React genuinely.

CORRECTION: Reply to content first. Then casually: "Quick tip — say [correct] instead of [wrong]." Max 1 tip.

KOREAN MODE: If message has [KOREAN] prefix — say "In English: '[translation]' — try that!" then continue.`
  },
  yungeon: {
    name:'윤건', emoji:'🏅', grade:'초5 • 수영선수', aiName:'Sunny', aiEmoji:'☀️',
    theme:'th-yg', avBg:'linear-gradient(135deg,rgba(180,80,255,.2),rgba(100,0,255,.2))',
    avBorder:'rgba(180,80,255,.3)', statusColor:'#c87fff',
    badgeBg:'rgba(180,80,255,.1)', badgeColor:'#c87fff', badgeBorder:'rgba(180,80,255,.2)',
    vbClass:'vb-yg', userBub:'bub-yg', fixClass:'fix-yg',
    dotColor:'rgba(180,100,255,.7)', ttsPitch:1.15, ttsRate:0.88,
    systemPrompt:`You are "Sunny", the friendliest English buddy for Yungeon (윤건), a Korean 11-year-old who:
- Lived in Indonesia for 4 years at an international school — good English!
- Is a competitive swimmer with medals
- Just moved back to Korea from Indonesia

THIS IS VOICE: 2-3 sentences max. Warm spoken English. No lists. End with 1 easy question.

STYLE: Awesome older sibling. Topics: swimming races, Indonesia memories, animals, food, Minecraft/Roblox, superheroes, funny facts, school, cartoons. React big: "Oh wow!", "That's SO cool!"

CORRECTION: Warm response first. Then: "English tip — say [correct]!" Brief and kind.

KOREAN MODE: If message has [KOREAN] prefix — say "In English: '[translation]' — try it!" then continue warmly.`
  }
};

let user=null, msgs=[], loading=false, listening=false, speaking=false;
let recognition=null, korOn=false;
let voices=[];
const synth=window.speechSynthesis;

function loadVoices(){voices=synth.getVoices();}
loadVoices();
if(synth.onvoiceschanged!==undefined) synth.onvoiceschanged=loadVoices;

// ── NAV ──────────────────────────────────────────
function selectUser(id){ user=PROFILES[id]; msgs=[]; setupUI(); show('chat'); startConvo(); }
function switchUser(id){ synth.cancel(); stopListen(); user=PROFILES[id]; msgs=[]; setupUI(); startConvo(); }
function goHome(){ stopListen(); synth.cancel(); show('home'); user=null; msgs=[]; }
function show(id){ document.querySelectorAll('.screen').forEach(s=>s.classList.toggle('hidden',s.id!==id)); }

function setupUI(){
  const u=user;
  document.getElementById('chat').className='screen '+u.theme;
  document.getElementById('hAv').textContent=u.aiEmoji;
  document.getElementById('hAv').style.cssText=`width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;background:${u.avBg};border:1px solid ${u.avBorder}`;
  document.getElementById('hName').textContent=u.aiName;
  document.getElementById('hStatus').textContent='online ●';
  document.getElementById('hStatus').style.color=u.statusColor;
  document.getElementById('hBadge').textContent=u.grade;
  document.getElementById('hBadge').style.cssText=`margin-left:auto;border-radius:18px;padding:5px 12px;font-size:11px;font-weight:800;flex-shrink:0;background:${u.badgeBg};color:${u.badgeColor};border:1px solid ${u.badgeBorder}`;
  document.getElementById('vBtn').className='vbtn '+u.vbClass;
  document.getElementById('emptyEmoji').textContent=u.aiEmoji;
  document.getElementById('emptyTxt').textContent=`${u.aiName}가 오늘의 주제를 고르는 중이에요...`;
  document.getElementById('msgs').innerHTML=`<div class="empty" id="empty"><div style="font-size:44px;margin-bottom:12px">${u.aiEmoji}</div><div>${u.aiName}가 오늘의 주제를 고르는 중이에요...</div></div>`;
  // sidebar active
  document.getElementById('sYj').classList.toggle('active', u===PROFILES.yunjae);
  document.getElementById('sYg').classList.toggle('active', u===PROFILES.yungeon);
  setStatus('준비 중...'); setHint('잠시만 기다려주세요'); setIcon('⏳');
  korOn=false; updateKorToggle();
}

// ── CONVO ────────────────────────────────────────
async function startConvo(){
  const starter=`Hi ${user.aiName}! I'm ${user.name}. I just moved back to Korea after 4 years in Indonesia. I'm a competitive swimmer. Let's chat in English — pick an interesting topic and start!`;
  await callAI([{role:'user',content:starter}],true);
}

async function callAI(apiMsgs,isFirst){
  if(!API_KEY||API_KEY==='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'){
    removeEmpty(); addAIBubble('⚠️ API 키가 설정되지 않았어요! 파일을 열고 YOUR_API_KEY_HERE 부분에 API 키를 넣어주세요.');
    return;
  }
  loading=true; showTyping(true);
  setStatus('AI가 생각 중...'); setIcon('⏳');
  document.getElementById('hStatus').textContent='생각 중...';

  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':API_KEY,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:400,system:user.systemPrompt,messages:apiMsgs})
    });
    const data=await res.json();
    if(data.error){throw new Error(data.error.message);}
    const reply=(data.content||[]).map(b=>b.text||'').join('')||'Can you try again?';
    showTyping(false); removeEmpty(); addAIBubble(reply);
    if(isFirst) msgs=[{role:'user',content:apiMsgs[0].content},{role:'assistant',content:reply}];
    else msgs.push({role:'assistant',content:reply});
    speak(reply);
  }catch(e){
    showTyping(false); removeEmpty();
    addAIBubble(`오류가 발생했어요: ${e.message}\nAPI 키를 확인해주세요!`);
    loading=false; setStatus('오류 발생'); setIcon('🎤');
    document.getElementById('hStatus').textContent='오류';
  }
}

// ── STT ──────────────────────────────────────────
function toggleListen(){
  if(loading||speaking) return;
  if(listening){stopListen();return;}
  synth.cancel();
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){alert('Chrome 또는 Safari를 사용해주세요!');return;}
  const r=new SR();
  r.lang=korOn?'ko-KR':'en-US';
  r.continuous=false; r.interimResults=true;
  r.onstart=()=>{listening=true;setIcon('⏹️');setStatus('듣고 있어요... 말해보세요! 🎤');setHint('말이 끝나면 자동으로 전송돼요');document.getElementById('vBtn').classList.add('listening');};
  r.onresult=(e)=>{
    const txt=Array.from(e.results).map(r=>r[0].transcript).join('');
    if(e.results[e.results.length-1].isFinal) finishListen(txt);
    else setStatus(`"${txt}"...`);
  };
  r.onerror=(e)=>{stopListen();if(e.error==='no-speech')setStatus('소리가 안 들려요. 다시 눌러보세요');else if(e.error==='not-allowed')setStatus('마이크 권한을 허용해주세요!');else setStatus('오류. 다시 시도해보세요');setIcon('🎤');};
  r.onend=()=>{listening=false;document.getElementById('vBtn').classList.remove('listening');if(!loading&&!speaking)setIcon('🎤');};
  recognition=r; r.start();
}

function stopListen(){
  if(recognition)try{recognition.stop();}catch(e){}
  listening=false;
  document.getElementById('vBtn').classList.remove('listening');
}

function finishListen(transcript){
  stopListen();
  if(!transcript.trim()){setStatus('말이 감지되지 않았어요. 다시 눌러보세요');return;}
  const apiText=korOn?`[KOREAN] ${transcript}`:transcript;
  addUserBubble(transcript);
  msgs.push({role:'user',content:apiText});
  callAI(msgs,false);
}

// ── TTS ──────────────────────────────────────────
function speak(text){
  synth.cancel();
  const clean=text.replace(/💡 Quick tip[:\-—]?\s*/gi,'Quick tip. ').replace(/✨ English tip[:\-—]?\s*/gi,'English tip. ').replace(/[*_`⚠️]/g,'');
  const utt=new SpeechSynthesisUtterance(clean);
  const enV=voices.filter(v=>v.lang.startsWith('en'));
  const pref=enV.find(v=>v.name.includes('Samantha')||v.name.includes('Karen')||v.name.includes('Google US English')||v.name.includes('Daniel'))||enV[0];
  if(pref) utt.voice=pref;
  utt.lang='en-US'; utt.pitch=user.ttsPitch; utt.rate=user.ttsRate; utt.volume=1;
  utt.onstart=()=>{speaking=true;loading=false;document.getElementById('vBtn').classList.add('speaking');setIcon('🔊');setStatus(`${user.aiName}가 말하는 중... 🔊`);setHint('말이 끝나면 🎤 버튼을 눌러 대답하세요');document.getElementById('hStatus').textContent='말하는 중 🔊';};
  utt.onend=()=>{speaking=false;document.getElementById('vBtn').classList.remove('speaking');setIcon('🎤');setStatus('버튼을 누르고 말해보세요');setHint('말이 끝나면 자동으로 AI가 답해요');document.getElementById('hStatus').textContent='online ●';};
  utt.onerror=()=>{speaking=false;loading=false;document.getElementById('vBtn').classList.remove('speaking');setIcon('🎤');setStatus('버튼을 누르고 말해보세요');document.getElementById('hStatus').textContent='online ●';};
  setTimeout(()=>synth.speak(utt),120);
  document.getElementById('hStatus').textContent='응답 중...';
}

// ── KOREAN TOGGLE ────────────────────────────────
function toggleKor(){
  korOn=!korOn; updateKorToggle();
}
function updateKorToggle(){
  ['korSw','korSwMobile'].forEach(id=>{
    const el=document.getElementById(id);
    if(el) el.classList.toggle('on',korOn);
  });
}

// ── UI HELPERS ───────────────────────────────────
function addAIBubble(text){
  const corrRx=/(Quick tip —|Quick tip—|English tip —|English tip—|Quick tip:)([\s\S]*?)$/i;
  const m=text.match(corrRx);
  let main=text,fix=null;
  if(m){main=text.slice(0,m.index).trim();fix=m[0];}
  const msgs=document.getElementById('msgs');
  const row=document.createElement('div');row.className='msg-row';
  const av=document.createElement('div');
  av.style.cssText=`width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;background:${user.avBg};border:1px solid ${user.avBorder}`;
  av.textContent=user.aiEmoji;
  const wrap=document.createElement('div');wrap.style.maxWidth='76%';
  const bub=document.createElement('div');bub.className='bub bub-ai';bub.textContent=main;wrap.appendChild(bub);
  if(fix){const fb=document.createElement('div');fb.className='fix '+user.fixClass;fb.textContent=fix;wrap.appendChild(fb);}
  row.appendChild(av);row.appendChild(wrap);
  msgs.appendChild(row);msgs.scrollTop=msgs.scrollHeight;
}

function addUserBubble(text){
  const el=document.getElementById('msgs');
  const row=document.createElement('div');row.className='msg-row usr-row';
  const bub=document.createElement('div');bub.className='bub '+user.userBub;bub.textContent=text;
  row.appendChild(bub);el.appendChild(row);el.scrollTop=el.scrollHeight;
}

let typingEl=null;
function showTyping(on){
  const el=document.getElementById('msgs');
  if(on&&!typingEl){
    typingEl=document.createElement('div');typingEl.className='typing-row';
    const dc=user?.dotColor||'rgba(255,255,255,.5)';
    typingEl.innerHTML=`<div style="width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;background:${user.avBg};border:1px solid ${user.avBorder}">${user.aiEmoji}</div><div class="t-bub"><div class="dot" style="background:${dc}"></div><div class="dot" style="background:${dc};animation-delay:.2s"></div><div class="dot" style="background:${dc};animation-delay:.4s"></div></div>`;
    el.appendChild(typingEl);el.scrollTop=el.scrollHeight;
  }else if(!on&&typingEl){typingEl.remove();typingEl=null;}
}

function removeEmpty(){const e=document.getElementById('empty');if(e)e.remove();}
function setStatus(t){document.getElementById('vStatus').textContent=t;}
function setHint(t){document.getElementById('vHint').textContent=t;}
function setIcon(i){document.getElementById('vIcon').textContent=i;}

// 스페이스바 = 마이크 토글 (데스크탑)
document.addEventListener('keydown',e=>{
  if(e.code==='Space'&&document.getElementById('chat')&&!document.getElementById('chat').classList.contains('hidden')){
    e.preventDefault();toggleListen();
  }
});
</script>
